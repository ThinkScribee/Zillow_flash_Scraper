name: Daily Real Estate Scraper

on:
  schedule:
    # This cron syntax runs at 9:00 AM UTC every day.
    # (Adjust the '9' to match your local timezone offset if needed)
    - cron: '0 9 * * *'

  # This line lets you click a button on GitHub to run it manually for testing
  workflow_dispatch:

jobs:
  scrape_and_email:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install your scraper's dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the scraper and output directly to a CSV!
      - name: Run Scrapy
        run: scrapy crawl zillow -O todays_leads.csv

      # 5. Run a quick Python script to email that CSV
      - name: Send Email
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python send_email.py